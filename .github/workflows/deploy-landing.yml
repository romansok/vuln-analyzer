name: Deploy landing

on:
  push:
    branches: [main]
    paths:
      - "landing/**"
      - ".github/workflows/deploy-landing.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Newer runs cancel in-flight runs — no point publishing a stale build.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build static export
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: landing
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: landing/package-lock.json

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NODE_ENV: production

      # Tell GitHub Pages not to run Jekyll, so _next/ folders are served as-is.
      - name: Disable Jekyll
        run: touch out/.nojekyll

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: landing/out

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
